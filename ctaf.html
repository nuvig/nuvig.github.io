<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KANP CTAF 122.9 — Live Transmissions</title>
  <meta name="description" content="Live and recorded transmissions on the KANP (Lee Airport, Annapolis MD) CTAF, 122.9 MHz, received on a local SDR.">
  <style>
    :root{
      --bg:#0f0f10; --panel:#161616; --panel2:#1a1a1a; --line:#282828;
      --text:#d8d8d8; --muted:#888; --dim:#555; --accent:#4a9eff; --live:#ff5c5c;
      --sel-bg:#17222f; --sel-bd:#2a4a6a;
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      max-width:900px; margin:0 auto; padding:22px 18px 130px;
    }
    a{color:#aaa;text-decoration:none} a:hover{color:#ccc}
    #back-link{display:inline-block;font-size:14px;color:#666;margin-bottom:14px}
    #back-link:hover{color:#ccc}
    h1{font-size:24px;margin:0 0 2px;letter-spacing:-.01em}
    h1 .freq{color:var(--accent)}
    .subtitle{color:#666;font-size:14px;margin:2px 0 18px}

    .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
    .btn{
      background:var(--panel);border:1px solid var(--line);border-radius:8px;
      color:var(--text);font:inherit;font-size:14px;padding:7px 13px;cursor:pointer;
      display:inline-flex;align-items:center;gap:8px;
    }
    .btn:hover{border-color:#3a3a3a;background:var(--panel2)}
    .btn.live-on{border-color:var(--live);color:#fff}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--dim)}
    .btn.live-on .dot{background:var(--live);animation:pulse 1.6s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,92,92,.5)}70%{box-shadow:0 0 0 8px rgba(255,92,92,0)}100%{box-shadow:0 0 0 0 rgba(255,92,92,0)}}
    #status{color:#666;font-size:13px;margin-bottom:10px}
    #status.err{color:#d08770}

    .daydiv{color:#555;font-size:12px;text-transform:uppercase;letter-spacing:.05em;
      margin:16px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--line)}
    .tx{
      display:flex;gap:14px;padding:10px 12px;border-radius:8px;cursor:pointer;
      border:1px solid transparent;align-items:baseline;
    }
    .tx:hover{background:#161616}
    .tx.sel{background:var(--sel-bg);border-color:var(--sel-bd)}
    .tx .play{color:var(--muted);width:16px;flex:0 0 auto}
    .tx.sel .play{color:var(--accent)}
    .tx .time{color:#bbb;font-size:14px;white-space:nowrap;width:78px;font-variant-numeric:tabular-nums}
    .tx .ago{color:#666;font-size:13px;flex:1}
    .tx .dur{color:#555;font-size:12px;white-space:nowrap;text-align:right}
    .tx.new{animation:flash 1.2s ease-out}
    @keyframes flash{from{background:#1d2a1d}to{background:transparent}}
    .empty{color:#555;font-style:italic;padding:20px 4px}
    .banner{
      display:flex;gap:10px;align-items:baseline;background:#241d12;
      border:1px solid #6a4f22;border-radius:10px;padding:11px 14px;margin-bottom:14px;
      color:#e0c48a;font-size:14px;
    }
    .banner b{color:#ffd89b}
    .banner a{color:#ffd89b;text-decoration:underline}

    #player-bar{
      position:fixed;left:0;right:0;bottom:0;background:#141414f2;
      border-top:1px solid #2a2a2a;backdrop-filter:blur(6px);padding:10px 16px;
    }
    #player-inner{max-width:900px;margin:0 auto;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    #player-inner audio{flex:1;min-width:240px;height:38px}
    #nowplaying{color:#888;font-size:13px;white-space:nowrap}
    #player-inner label{color:#777;font-size:13px;user-select:none;cursor:pointer;display:inline-flex;gap:5px;align-items:center}
    .keys{color:#444;font-size:12px}
    kbd{background:#222;border:1px solid #3a3a3a;border-radius:4px;padding:0 5px;font-size:11px;color:#999}
    @media (max-width:640px){ .tx .ago{display:none} .keys{display:none} }
  </style>
</head>
<body>
  <a id="back-link" href="/">&larr; jesselevine.net</a>
  <h1>KANP CTAF <span class="freq">122.9</span></h1>
  <p class="subtitle">Lee Airport · Annapolis, MD — live transmissions received on a local SDR.
    Unofficial monitor, not for operational use.</p>

  <div id="tuned-away" class="banner" style="display:none"></div>

  <div class="bar">
    <button id="live-btn" class="btn"><span class="dot"></span><span id="live-label">Listen live</span></button>
    <span id="status">connecting&hellip;</span>
  </div>

  <div id="list"><div class="empty">Loading transmissions&hellip;</div></div>

  <div id="player-bar">
    <div id="player-inner">
      <audio id="player" controls preload="none"></audio>
      <span id="nowplaying">nothing selected</span>
      <label><input type="checkbox" id="follow" checked> auto-play new</label>
      <label><input type="checkbox" id="advance" checked> auto-advance</label>
      <span class="keys"><kbd>j</kbd>/<kbd>k</kbd> older/newer &nbsp;<kbd>space</kbd> play/pause</span>
    </div>
  </div>

<script>
  // ===== config =====
  const HOST = "https://jalpine.taila8f067.ts.net";
  const BASE = HOST + "/ctaf";        // clip server (index.json + clips/)
  const LIVE = HOST + "/kanp.mp3";    // continuous live stream
  const POLL_MS = 8000;

  const $ = s => document.querySelector(s);
  const listEl = $("#list"), statusEl = $("#status"), player = $("#player");
  const nowEl = $("#nowplaying"), liveBtn = $("#live-btn"), liveLabel = $("#live-label");
  const followCb = $("#follow"), advanceCb = $("#advance");

  let clips = [];          // newest-first
  let selTs = null;        // ts of selected clip
  let maxTs = 0;           // newest ts seen (for "new" detection)
  let liveMode = false;    // continuous stream playing
  const live = new Audio();
  live.preload = "none";

  const pad = n => String(n).padStart(2, "0");
  function fmtTime(ts){
    const d = new Date(ts*1000);
    return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
  }
  function fmtAgo(ts){
    const s = Math.max(0, Math.floor(Date.now()/1000 - ts));
    if (s < 60) return s+"s ago";
    if (s < 3600) return Math.floor(s/60)+"m ago";
    if (s < 86400) return Math.floor(s/3600)+"h ago";
    return Math.floor(s/86400)+"d ago";
  }
  function dayLabel(ts){
    const d = new Date(ts*1000), now = new Date();
    const ymd = x => x.getFullYear()+"-"+pad(x.getMonth()+1)+"-"+pad(x.getDate());
    const y = new Date(now); y.setDate(now.getDate()-1);
    if (ymd(d) === ymd(now)) return "Today";
    if (ymd(d) === ymd(y)) return "Yesterday";
    return d.toLocaleDateString(undefined, {weekday:"long", month:"short", day:"numeric"});
  }

  function render(){
    if (!clips.length){
      listEl.innerHTML = '<div class="empty">No transmissions recorded yet. This updates automatically when someone keys up on 122.9.</div>';
      return;
    }
    let html = "", lastDay = "";
    for (const c of clips){
      const dl = dayLabel(c.ts);
      if (dl !== lastDay){ html += '<div class="daydiv">'+dl+'</div>'; lastDay = dl; }
      const sel = c.ts === selTs ? " sel" : "";
      const isNew = c.ts > 0 && c._new ? " new" : "";
      html += '<div class="tx'+sel+isNew+'" data-ts="'+c.ts+'">'
            +   '<span class="play">&#9654;</span>'
            +   '<span class="time">'+fmtTime(c.ts)+'</span>'
            +   '<span class="ago">'+fmtAgo(c.ts)+'</span>'
            +   '<span class="dur">'+c.dur.toFixed(1)+'s</span>'
            + '</div>';
    }
    listEl.innerHTML = html;
    listEl.querySelectorAll(".tx").forEach(el =>
      el.addEventListener("click", () => selectByTs(parseFloat(el.dataset.ts), true)));
  }

  function selectByTs(ts, play){
    const c = clips.find(x => x.ts === ts);
    if (!c) return;
    selTs = ts;
    if (liveMode) stopLive();
    render();
    const row = listEl.querySelector('.tx[data-ts="'+ts+'"]');
    if (row) row.scrollIntoView({block:"nearest"});
    nowEl.textContent = fmtTime(ts) + " · " + c.dur.toFixed(1) + "s";
    player.src = BASE + "/" + c.clip;
    if (play) player.play().catch(()=>{});
  }

  function step(dir){ // dir +1 = older (down), -1 = newer (up)
    if (!clips.length) return;
    let i = clips.findIndex(x => x.ts === selTs);
    if (i === -1) i = 0; else i += dir;
    if (i < 0) i = 0;
    if (i >= clips.length) i = clips.length - 1;
    selectByTs(clips[i].ts, true);
  }

  player.addEventListener("ended", () => { if (advanceCb.checked) step(-1); }); // advance to newer

  // ----- live continuous stream -----
  function startLive(){
    liveMode = true; selTs = null; render();
    player.pause();
    liveBtn.classList.add("live-on"); liveLabel.textContent = "Live · stop";
    nowEl.textContent = "live stream";
    live.src = LIVE + "?t=" + Date.now();
    live.play().catch(()=>{ liveLabel.textContent = "tap to allow audio"; });
  }
  function stopLive(){
    liveMode = false; live.pause(); live.removeAttribute("src");
    liveBtn.classList.remove("live-on"); liveLabel.textContent = "Listen live";
  }
  liveBtn.addEventListener("click", () => liveMode ? stopLive() : startLive());

  // ----- data polling -----
  async function poll(){
    try{
      const r = await fetch(BASE + "/index.json?t=" + Date.now());
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      // One receiver serves both pages, so keep only CTAF clips here.
      // Clips recorded before the scanner existed have no freq field — those
      // are all CTAF.
      const isCtaf = c => !c.freq || Math.abs(parseFloat(String(c.freq).replace(/[Mm]$/,"")) - 122.9) < 0.0005;
      const incoming = (data.clips || []).filter(isCtaf).sort((a,b) => b.ts - a.ts);
      const prevMax = maxTs;
      for (const c of incoming){ c._new = c.ts > prevMax; if (c.ts > maxTs) maxTs = c.ts; }
      const firstLoad = clips.length === 0;
      clips = incoming;
      render();
      statusEl.classList.remove("err");
      statusEl.textContent = clips.length + " transmission" + (clips.length===1?"":"s")
        + " · updated " + fmtTime(data.updated || Date.now()/1000);
      // auto-play newest new clip if following (and not already listening live)
      if (!firstLoad && followCb.checked && !liveMode){
        const newest = incoming[0];
        if (newest && newest._new) selectByTs(newest.ts, true);
      }
    }catch(e){
      statusEl.classList.add("err");
      statusEl.textContent = "recorder offline — the receiver PC may be off ("+e.message+")";
    }
  }

  document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "j"){ e.preventDefault(); step(1); }
    else if (e.key === "k"){ e.preventDefault(); step(-1); }
    else if (e.key === " "){ e.preventDefault(); player.paused ? player.play().catch(()=>{}) : player.pause(); }
  });

  // The single receiver can be tuned away from 122.9 via scanner.html.
  // Say so plainly instead of just going silent.
  async function pollState(){
    const el = document.getElementById("tuned-away");
    try{
      const r = await fetch(BASE + "/api/state?t=" + Date.now());
      const s = await r.json();
      if (s.is_ctaf){ el.style.display = "none"; return; }
      const f = parseFloat(String(s.freq).replace(/[Mm]$/,""));
      el.style.display = "";
      el.innerHTML = "<span>&#9888;</span><span>The receiver is currently tuned to <b>" +
        f + " MHz " + String(s.mode).toUpperCase() + "</b>, so <b>122.9 is not being " +
        "monitored right now</b>. Live audio and new clips are from that frequency. " +
        '<a href="/scanner.html">Open the scanner</a> to tune back.</span>';
    }catch(e){ el.style.display = "none"; }
  }

  poll(); pollState();
  setInterval(pollState, POLL_MS);
  setInterval(poll, POLL_MS);
  setInterval(() => { if (clips.length) render(); }, 30000); // refresh "ago" labels
</script>
</body>
</html>

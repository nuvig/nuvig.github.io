
# Samples air traffic near KANP in a ~5-minute burst each run and stores the
# results on the `traffic-data` branch:
#   traffic.json          rolling 30-day snapshots (temporal heatmap)
#   tracks/YYYY-MM-DD.json  per-day track segments (History Explorer)
#   tracks/index.json     list of available days
# The branch always holds exactly one commit (force-pushed each run) so the
# main history stays clean. The tracker page fetches the files from
# raw.githubusercontent.com, which serves them with CORS enabled.
#
# Note: GitHub schedules are best-effort — in practice runs land every
# ~2–3 h rather than every 30 min. Full 24/7 coverage comes from a local
# RTL-SDR receiver via scripts/receiver-export.js, which writes the same
# track format at much higher fidelity.

name: Collect KANP traffic

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-traffic
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Restore existing data
        run: |
          mkdir /tmp/traffic-data
          cd /tmp/traffic-data
          git init -b traffic-data
          if git fetch "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" traffic-data; then
            git checkout FETCH_HEAD -- . || true
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Sample airspace (5-minute burst)
        run: node scripts/collect-airspace.js /tmp/traffic-data 300 20

      - name: Push to traffic-data branch
        run: |
          cd /tmp/traffic-data
          rm -rf .git
          git init -b traffic-data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update KANP airspace data"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" traffic-data
        env:
          GITHUB_TOKEN: ${{ github.token }}

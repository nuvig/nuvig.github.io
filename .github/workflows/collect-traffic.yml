
# Collects a snapshot of air traffic near KANP every 30 minutes and stores
# the rolling 30-day history as traffic.json on the `traffic-data` branch.
# The branch always holds exactly one commit (force-pushed each run) so the
# main history stays clean. The tracker page fetches the file from
# raw.githubusercontent.com, which serves it with CORS enabled.

name: Collect KANP traffic

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-traffic
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get existing history
        run: |
          if git fetch origin traffic-data 2>/dev/null; then
            git show FETCH_HEAD:traffic.json > existing.json || echo '[]' > existing.json
          else
            echo '[]' > existing.json
          fi

      - name: Fetch snapshot and merge
        run: node scripts/collect-traffic.js existing.json traffic.json

      - name: Push to traffic-data branch
        run: |
          mkdir /tmp/traffic-data
          cp traffic.json /tmp/traffic-data/
          cd /tmp/traffic-data
          git init -b traffic-data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic.json
          git commit -m "Update KANP traffic data"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" traffic-data
        env:
          GITHUB_TOKEN: ${{ github.token }}

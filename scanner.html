<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDR Scanner — Annapolis</title>
  <meta name="description" content="Remotely tunable SDR scanner with recorded transmissions — Annapolis, MD.">
  <meta name="robots" content="noindex">
  <style>
    :root{
      --bg:#0f0f10; --panel:#161616; --panel2:#1a1a1a; --line:#282828;
      --text:#d8d8d8; --muted:#888; --dim:#555; --accent:#4a9eff; --live:#ff5c5c;
      --ok:#2ecc71; --warn:#f39c12; --sel-bg:#17222f; --sel-bd:#2a4a6a;
    }
    *{box-sizing:border-box}
    body{
      margin:0 auto; background:var(--bg); color:var(--text); max-width:900px;
      font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      padding:22px 18px 130px;
    }
    a{color:#aaa;text-decoration:none} a:hover{color:#ccc}
    #back-link{display:inline-block;font-size:14px;color:#666;margin-bottom:14px}
    h1{font-size:24px;margin:0 0 2px}
    .subtitle{color:#666;font-size:14px;margin:2px 0 18px}

    .now{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:14px;
      display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    }
    .now .big{font-size:34px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
    .now .big .unit{font-size:16px;color:var(--muted);font-weight:400;margin-left:4px}
    .now .mode{
      border:1px solid var(--line);border-radius:6px;padding:2px 8px;
      font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
    }
    .now .label{color:var(--accent);font-size:14px}
    .pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-left:auto}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--dim)}
    .dot.ok{background:var(--ok)} .dot.bad{background:var(--live)}

    .btn{
      background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);
      font:inherit;font-size:14px;padding:7px 13px;cursor:pointer;display:inline-flex;
      align-items:center;gap:8px;
    }
    .btn:hover{border-color:#3a3a3a;background:var(--panel2)}
    .btn.live-on{border-color:var(--live);color:#fff}
    .btn.live-on .dot{background:var(--live)}
    .btn.primary{border-color:#2a4a6a;background:#17222f}
    .btn:disabled{opacity:.45;cursor:not-allowed}

    fieldset{border:1px solid var(--line);border-radius:12px;margin:0 0 14px;padding:14px 16px}
    legend{color:#9aa4b0;font-size:13px;padding:0 6px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
    input,select{
      background:#0e1013;color:var(--text);border:1px solid var(--line);
      border-radius:6px;padding:7px 10px;font:inherit;font-size:14px;
    }
    input[type=text]{width:130px}
    .grp{margin:10px 0 4px;color:#666;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
    .presets{display:flex;flex-wrap:wrap;gap:7px}
    .chip{
      background:#141414;border:1px solid var(--line);border-radius:14px;color:#9aa4b0;
      font:inherit;font-size:13px;padding:5px 12px;cursor:pointer;
    }
    .chip:hover{border-color:#3a3a3a;color:#ddd}
    .chip.on{color:#fff;border-color:var(--accent)}
    .chip .f{color:#666;margin-left:5px;font-variant-numeric:tabular-nums}
    .chip.on .f{color:var(--accent)}
    #msg{font-size:13px;min-height:18px;color:var(--muted)}
    #msg.ok{color:var(--ok)} #msg.err{color:var(--live)}
    .locked-note{color:#666;font-size:13px}

    .daydiv{color:#555;font-size:12px;text-transform:uppercase;letter-spacing:.05em;
      margin:16px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--line)}
    .tx{display:flex;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;
      border:1px solid transparent;align-items:baseline}
    .tx:hover{background:#161616}
    .tx.sel{background:var(--sel-bg);border-color:var(--sel-bd)}
    .tx .play{color:var(--muted);width:16px;flex:0 0 auto}
    .tx.sel .play{color:var(--accent)}
    .tx .time{color:#bbb;font-size:14px;width:78px;font-variant-numeric:tabular-nums;white-space:nowrap}
    .tx .freq{color:var(--accent);font-size:13px;width:74px;font-variant-numeric:tabular-nums;white-space:nowrap}
    .tx .ago{color:#666;font-size:13px;flex:1}
    .tx .dur{color:#555;font-size:12px;text-align:right;white-space:nowrap}
    .empty{color:#555;font-style:italic;padding:20px 4px}

    #player-bar{position:fixed;left:0;right:0;bottom:0;background:#141414f2;
      border-top:1px solid #2a2a2a;backdrop-filter:blur(6px);padding:10px 16px}
    #player-inner{max-width:900px;margin:0 auto;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    #player-inner audio{flex:1;min-width:240px;height:38px}
    #nowplaying{color:#888;font-size:13px;white-space:nowrap}
    #player-inner label{color:#777;font-size:13px;display:inline-flex;gap:5px;align-items:center;cursor:pointer}
    @media (max-width:640px){ .tx .ago{display:none} .now .big{font-size:28px} }
  </style>
</head>
<body>
  <a id="back-link" href="/">&larr; jesselevine.net</a>
  <h1>SDR Scanner</h1>
  <p class="subtitle">One receiver in Annapolis, MD — remotely tunable. Recorded
    transmissions below. Unofficial monitor, not for operational use.</p>

  <div class="now">
    <div>
      <div class="big"><span id="cur-freq">—</span><span class="unit">MHz</span>
        <span class="mode" id="cur-mode">--</span></div>
      <div class="label" id="cur-label">&nbsp;</div>
    </div>
    <span class="pill"><span class="dot" id="stat-dot"></span><span id="stat-text">connecting…</span></span>
  </div>

  <div class="row">
    <button id="live-btn" class="btn"><span class="dot"></span><span id="live-label">Listen live</span></button>
  </div>

  <fieldset>
    <legend>Tuning</legend>
    <div id="lock-area" class="row">
      <input type="password" id="key" placeholder="control key" autocomplete="off">
      <button class="btn" id="unlock">Unlock</button>
      <span class="locked-note">Tuning is locked. Enter the control key to retune the receiver.</span>
    </div>
    <div id="ctl-area" style="display:none">
      <div class="row">
        <input type="text" id="freq" placeholder="e.g. 122.9">
        <select id="mode">
          <option value="am">AM (aircraft)</option>
          <option value="fm">FM (marine / weather)</option>
          <option value="wbfm">WBFM (broadcast)</option>
        </select>
        <button class="btn primary" id="tune">Tune</button>
        <button class="btn" id="lock">Lock</button>
      </div>
      <div id="presets"></div>
    </div>
    <div id="msg"></div>
  </fieldset>

  <div id="list"><div class="empty">Loading transmissions…</div></div>

  <div id="player-bar">
    <div id="player-inner">
      <audio id="player" controls preload="none"></audio>
      <span id="nowplaying">nothing selected</span>
      <label><input type="checkbox" id="follow" checked> auto-play new</label>
      <label><input type="checkbox" id="onlycur"> only current freq</label>
    </div>
  </div>

<script>
  const HOST = "https://jalpine.taila8f067.ts.net";
  const BASE = HOST + "/ctaf";
  const LIVE = HOST + "/kanp.mp3";
  const POLL_MS = 8000;

  // Presets — aviation frequencies taken from the local Pi feed config.
  const PRESETS = [
    ["Aviation (AM)", [
      ["KANP CTAF",          "122.9",   "am"],
      ["Guard / emergency",  "121.5",   "am"],
      ["Potomac Approach",   "124.55",  "am"],
      ["Baltimore Tower",    "119.4",   "am"],
      ["Potomac BWI Final",  "119.0",   "am"],
      ["BWI Final (alt)",    "119.7",   "am"],
      ["Air-to-air",         "122.75",  "am"],
    ]],
    ["Marine — Chesapeake (FM)", [
      ["Ch 16 distress/call", "156.8",  "fm"],
      ["Ch 13 bridge",        "156.65", "fm"],
      ["Ch 09 hailing",       "156.45", "fm"],
    ]],
    ["Weather (FM)", [
      ["NOAA Baltimore", "162.4",  "fm"],
      ["NOAA DC",        "162.55", "fm"],
      ["NOAA alt",       "162.475","fm"],
    ]],
  ];

  const $ = s => document.querySelector(s);
  const listEl=$("#list"), player=$("#player"), nowEl=$("#nowplaying");
  const liveBtn=$("#live-btn"), liveLabel=$("#live-label"), msgEl=$("#msg");
  const followCb=$("#follow"), onlyCur=$("#onlycur");

  let clips=[], selTs=null, maxTs=0, liveMode=false, state=null;
  const live=new Audio(); live.preload="none";
  const pad=n=>String(n).padStart(2,"0");
  const fmtTime=ts=>{const d=new Date(ts*1000);return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());};
  const mhz=f=>parseFloat(String(f).replace(/[Mm]$/,""))||0;
  function fmtAgo(ts){const s=Math.max(0,Math.floor(Date.now()/1000-ts));
    return s<60?s+"s ago":s<3600?Math.floor(s/60)+"m ago":s<86400?Math.floor(s/3600)+"h ago":Math.floor(s/86400)+"d ago";}
  function dayLabel(ts){const d=new Date(ts*1000),n=new Date();
    const ymd=x=>x.getFullYear()+"-"+pad(x.getMonth()+1)+"-"+pad(x.getDate());
    const y=new Date(n); y.setDate(n.getDate()-1);
    if(ymd(d)===ymd(n))return "Today"; if(ymd(d)===ymd(y))return "Yesterday";
    return d.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});}
  function presetName(f){
    const v=mhz(f);
    for(const [,items] of PRESETS) for(const [name,pf] of items)
      if(Math.abs(parseFloat(pf)-v)<0.0005) return name;
    return "";
  }

  // ---- key handling (stored locally in this browser only) ----
  const KEYNAME="ctaf_control_key";
  function getKey(){ return localStorage.getItem(KEYNAME)||""; }
  function setLocked(locked){
    $("#lock-area").style.display = locked ? "" : "none";
    $("#ctl-area").style.display  = locked ? "none" : "";
  }
  $("#unlock").onclick=()=>{
    const k=$("#key").value.trim();
    if(!k) return;
    localStorage.setItem(KEYNAME,k); $("#key").value="";
    setLocked(false); note("unlocked — tuning enabled","ok");
  };
  $("#lock").onclick=()=>{ localStorage.removeItem(KEYNAME); setLocked(true); note(""); };
  function note(t,cls){ msgEl.textContent=t; msgEl.className=cls||""; }

  // ---- presets ----
  function renderPresets(){
    let html="";
    for(const [group,items] of PRESETS){
      html+='<div class="grp">'+group+'</div><div class="presets">';
      for(const [name,f,m] of items){
        const on = state && Math.abs(mhz(state.freq)-parseFloat(f))<0.0005 ? " on":"";
        html+='<button class="chip'+on+'" data-f="'+f+'" data-m="'+m+'">'+name+
              '<span class="f">'+f+'</span></button>';
      }
      html+='</div>';
    }
    $("#presets").innerHTML=html;
    $("#presets").querySelectorAll(".chip").forEach(el=>
      el.onclick=()=>tune(el.dataset.f, el.dataset.m));
  }

  async function tune(f,m){
    const key=getKey();
    if(!key){ note("enter the control key first","err"); setLocked(true); return; }
    note("tuning to "+f+" MHz…");
    try{
      const r=await fetch(BASE+"/api/tune",{method:"POST",
        headers:{"Content-Type":"application/json","X-Control-Key":key},
        body:JSON.stringify({freq:f,mode:m})});
      const d=await r.json().catch(()=>({}));
      if(r.status===403){ note("control key rejected","err"); return; }
      if(!r.ok){ note(d.error||("error "+r.status),"err"); return; }
      note(d.message||"tuned","ok");
      setTimeout(pollState,3000); setTimeout(pollState,9000);
    }catch(e){ note("receiver unreachable — is the PC on? ("+e.message+")","err"); }
  }
  $("#tune").onclick=()=>{
    const f=$("#freq").value.trim(); if(!f) return;
    tune(f,$("#mode").value);
  };
  $("#freq").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#tune").click(); });

  // ---- state ----
  async function pollState(){
    try{
      const r=await fetch(BASE+"/api/state?t="+Date.now());
      state=await r.json();
      $("#cur-freq").textContent=mhz(state.freq).toFixed(3).replace(/0+$/,"").replace(/\.$/,"");
      $("#cur-mode").textContent=state.mode;
      $("#cur-label").textContent=presetName(state.freq)||" ";
      const ok=state.streaming;
      $("#stat-dot").className="dot "+(ok?"ok":"bad");
      $("#stat-text").textContent=ok?"receiving":"no audio ("+state.stalled_s+"s)";
      renderPresets();
    }catch(e){
      $("#stat-dot").className="dot bad";
      $("#stat-text").textContent="receiver offline";
    }
  }

  // ---- clips ----
  function render(){
    let src=clips;
    if(onlyCur.checked && state) src=clips.filter(c=>Math.abs(mhz(c.freq)-mhz(state.freq))<0.0005);
    if(!src.length){ listEl.innerHTML='<div class="empty">No transmissions recorded yet on this frequency.</div>'; return; }
    let html="",lastDay="";
    for(const c of src){
      const dl=dayLabel(c.ts);
      if(dl!==lastDay){ html+='<div class="daydiv">'+dl+'</div>'; lastDay=dl; }
      html+='<div class="tx'+(c.ts===selTs?" sel":"")+'" data-ts="'+c.ts+'">'
          +'<span class="play">&#9654;</span><span class="time">'+fmtTime(c.ts)+'</span>'
          +'<span class="freq">'+(mhz(c.freq)?mhz(c.freq).toFixed(3).replace(/0+$/,"").replace(/\.$/,""):"—")+'</span>'
          +'<span class="ago">'+fmtAgo(c.ts)+'</span>'
          +'<span class="dur">'+c.dur.toFixed(1)+'s</span></div>';
    }
    listEl.innerHTML=html;
    listEl.querySelectorAll(".tx").forEach(el=>
      el.onclick=()=>select(parseFloat(el.dataset.ts),true));
  }
  function select(ts,play){
    const c=clips.find(x=>x.ts===ts); if(!c) return;
    selTs=ts; if(liveMode) stopLive(); render();
    nowEl.textContent=fmtTime(ts)+" · "+mhz(c.freq)+" MHz · "+c.dur.toFixed(1)+"s";
    player.src=BASE+"/"+c.clip; if(play) player.play().catch(()=>{});
  }
  onlyCur.onchange=render;

  async function pollClips(){
    try{
      const r=await fetch(BASE+"/index.json?t="+Date.now());
      const d=await r.json();
      const inc=(d.clips||[]).slice().sort((a,b)=>b.ts-a.ts);
      const prev=maxTs;
      for(const c of inc){ c._new=c.ts>prev; if(c.ts>maxTs) maxTs=c.ts; }
      const first=clips.length===0; clips=inc; render();
      if(!first && followCb.checked && !liveMode && inc[0] && inc[0]._new) select(inc[0].ts,true);
    }catch(e){ /* state poll already reports offline */ }
  }

  function startLive(){
    liveMode=true; selTs=null; render(); player.pause();
    liveBtn.classList.add("live-on"); liveLabel.textContent="Live · stop";
    nowEl.textContent="live stream";
    live.src=LIVE+"?t="+Date.now(); live.play().catch(()=>{liveLabel.textContent="tap to allow audio";});
  }
  function stopLive(){ liveMode=false; live.pause(); live.removeAttribute("src");
    liveBtn.classList.remove("live-on"); liveLabel.textContent="Listen live"; }
  liveBtn.onclick=()=>liveMode?stopLive():startLive();

  setLocked(!getKey());
  renderPresets(); pollState(); pollClips();
  setInterval(pollState,POLL_MS); setInterval(pollClips,POLL_MS);
  setInterval(()=>{ if(clips.length) render(); },30000);
</script>
</body>
</html>

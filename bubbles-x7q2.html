<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubbles</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      background: linear-gradient(#04070f, #0a1626 70%, #10243c);
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      color: #e5e5e5;
      touch-action: manipulation;
    }
    #game { position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; cursor: crosshair; }
    #hud {
      position: fixed; top: 10px; left: 14px; right: 14px;
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 15px; pointer-events: none; text-shadow: 0 1px 4px #000;
      font-variant-numeric: tabular-nums;
    }
    #hud .best { color: #8fa3c0; font-size: 13px; }
    #hud .lives { letter-spacing: 3px; }
    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: rgba(4, 7, 15, 0.72); text-align: center; padding: 20px;
    }
    #overlay h1 { margin: 0; font-size: 2rem; letter-spacing: -0.01em; }
    #overlay p { margin: 0; color: #8fa3c0; max-width: 420px; line-height: 1.5; }
    #overlay button {
      margin-top: 8px; padding: 10px 26px; font-size: 1.05rem; font-weight: 600;
      background: #4a9eff; color: #fff; border: 0; border-radius: 8px; cursor: pointer;
    }
    #overlay button:hover { background: #3a8eef; }
    #overlay .final { font-size: 1.2rem; color: #e5e5e5; }
    #overlay[hidden] { display: none; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <span>Score: <span id="score">0</span> <span id="combo"></span></span>
    <span class="lives" id="lives"></span>
    <span class="best">Best: <span id="best">0</span></span>
  </div>
  <div id="overlay">
    <h1>Bubble Pop</h1>
    <p id="overlay-msg">Pop bubbles before they float away. Small bubbles score more,
      quick streaks build a combo. Let five escape and it's over.</p>
    <p class="final" id="final" hidden></p>
    <button id="start">Play</button>
  </div>

  <script>
    'use strict';
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const livesEl = document.getElementById('lives');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlay-msg');
    const finalEl = document.getElementById('final');
    const startBtn = document.getElementById('start');

    const MAX_LIVES = 5;
    let W = 0, H = 0;
    let bubbles = [], pops = [];
    let score = 0, combo = 0, comboAt = 0, lives = MAX_LIVES;
    let running = false, spawnTimer = 0, elapsed = 0, animId = null, lastT = 0;
    let best = parseInt(localStorage.getItem('bubbles_best') || '0', 10);
    bestEl.textContent = best;

    function size() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', size);
    size();

    // --- Sound: short WebAudio blip, pitch rises as bubbles shrink ---------
    let audio = null;
    function popSound(radius) {
      try {
        audio = audio || new (window.AudioContext || window.webkitAudioContext)();
        if (audio.state === 'suspended') audio.resume();
        const t = audio.currentTime;
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = 'sine';
        const f = 900 - radius * 10; // small bubble = higher pop
        osc.frequency.setValueAtTime(f, t);
        osc.frequency.exponentialRampToValueAtTime(f * 2.2, t + 0.07);
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.connect(gain).connect(audio.destination);
        osc.start(t); osc.stop(t + 0.13);
      } catch { /* no audio, game still plays */ }
    }

    function spawnBubble() {
      const r = 14 + Math.random() * 30;
      bubbles.push({
        x: r + Math.random() * (W - 2 * r),
        y: H + r,
        r,
        speed: (0.6 + Math.random() * 0.8) * (1 + elapsed / 90), // ramps up
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleAmp: 10 + Math.random() * 20,
        hue: 190 + Math.random() * 80,
      });
    }

    function popBubble(i) {
      const b = bubbles[i];
      bubbles.splice(i, 1);
      const now = performance.now();
      combo = now - comboAt < 900 ? combo + 1 : 1;
      comboAt = now;
      const pts = Math.max(1, Math.round(50 - b.r)) * combo;
      score += pts;
      pops.push({ x: b.x, y: b.y, r: b.r, hue: b.hue, life: 1, pts });
      popSound(b.r);
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = score;
      comboEl.textContent = combo > 1 ? `×${combo}` : '';
      livesEl.textContent = '●'.repeat(lives) + '○'.repeat(MAX_LIVES - lives);
    }

    function onPointerDown(e) {
      if (!running) return;
      const x = e.clientX, y = e.clientY;
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        if (Math.hypot(x - b.x, y - b.y) <= b.r + 8) { popBubble(i); return; }
      }
    }
    canvas.addEventListener('pointerdown', onPointerDown);

    function drawBubble(b) {
      const g = ctx.createRadialGradient(b.x - b.r * 0.35, b.y - b.r * 0.35, b.r * 0.1, b.x, b.y, b.r);
      g.addColorStop(0, `hsla(${b.hue}, 90%, 85%, 0.9)`);
      g.addColorStop(0.7, `hsla(${b.hue}, 85%, 60%, 0.35)`);
      g.addColorStop(1, `hsla(${b.hue}, 85%, 55%, 0.15)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `hsla(${b.hue}, 90%, 75%, 0.7)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // highlight glint
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.35, b.y - b.r * 0.4, b.r * 0.14, 0, Math.PI * 2);
      ctx.fill();
    }

    function update(t) {
      const dt = Math.min((t - lastT) / 16.67, 3); // frames, capped
      lastT = t;
      elapsed += dt / 60;
      ctx.clearRect(0, 0, W, H);

      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnBubble();
        // spawn faster over time: ~1.1 s down to ~0.35 s
        spawnTimer = Math.max(21, 66 - elapsed * 1.5) * (0.7 + Math.random() * 0.6);
      }

      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.y -= b.speed * dt;
        b.x += Math.sin(b.y / 40 + b.wobblePhase) * b.wobbleAmp * 0.02 * dt;
        if (b.y + b.r < 0) {
          bubbles.splice(i, 1);
          lives--;
          combo = 0;
          updateHud();
          if (lives <= 0) { gameOver(); return; }
          continue;
        }
        drawBubble(b);
      }

      // pop effects: expanding ring + points float
      for (let i = pops.length - 1; i >= 0; i--) {
        const p = pops[i];
        p.life -= 0.045 * dt;
        if (p.life <= 0) { pops.splice(i, 1); continue; }
        ctx.strokeStyle = `hsla(${p.hue}, 90%, 75%, ${p.life})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (2 - p.life), 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = `rgba(255,255,255,${p.life})`;
        ctx.font = '600 15px Segoe UI, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`+${p.pts}`, p.x, p.y - p.r - (1 - p.life) * 24);
      }

      animId = requestAnimationFrame(update);
    }

    function start() {
      bubbles = []; pops = [];
      score = 0; combo = 0; lives = MAX_LIVES; elapsed = 0; spawnTimer = 0;
      updateHud();
      overlay.hidden = true;
      running = true;
      lastT = performance.now();
      animId = requestAnimationFrame(update);
    }

    function gameOver() {
      running = false;
      if (animId) cancelAnimationFrame(animId);
      if (score > best) {
        best = score;
        localStorage.setItem('bubbles_best', String(best));
        bestEl.textContent = best;
        finalEl.textContent = `New best: ${score} 🎉`;
      } else {
        finalEl.textContent = `Final score: ${score}`;
      }
      finalEl.hidden = false;
      overlayMsg.textContent = 'Five got away. Another round?';
      startBtn.textContent = 'Play again';
      overlay.hidden = false;
    }

    startBtn.addEventListener('click', start);
  </script>
</body>
</html>
